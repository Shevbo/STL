# deploy/nginx.conf
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/shectory-trader
#          sudo ln -sf /etc/nginx/sites-available/shectory-trader /etc/nginx/sites-enabled/
# Build:   cd frontend && npm run build
# Reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name stl.shectory.ru shectory.ru trader.shectory.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stl.shectory.ru shectory.ru trader.shectory.ru;

    ssl_certificate /etc/letsencrypt/live/stl.shectory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stl.shectory.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Path to built frontend on hoster — adjust if install path differs
    root /home/ubuntu/apps/shectory-trader/frontend/dist;
    index index.html;

    # Svelte SPA — serve index.html for all non-asset routes
    location / {
        try_files $uri /index.html;
    }

    # QA checklist page → FastAPI (exact match; the SPA catch-all would otherwise
    # serve index.html here). The QA API lives under /api/ and is proxied below.
    location = /qa {
        proxy_pass http://127.0.0.1:8000/qa;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_cookie_path / /;
        proxy_cookie_domain ~^(.*)$ $host;
        # Never cache the QA page (the SPA index.html was cached here before this route
        # existed; no-store keeps the form fresh so a plain /qa load isn't stale).
        add_header Cache-Control "no-store" always;
    }

    # REST API → FastAPI on same machine
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_cookie_path / /;
        proxy_cookie_domain ~^(.*)$ $host;
        # Optimization-agent result POSTs carry full trades + equity curves for a
        # whole grid — can be many MB. Default 1m is too small.
        client_max_body_size 128m;
    }

    # WebSocket → FastAPI on same machine
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
