syntax = "proto3";

// Contract between the local QUIK agent (Windows, Go) and the STL orchestrator
// (FastAPI). sprint02 Phase 1 = read-only. No order transactions in this contract.
// Transport: the agent DIALS OUT to STL and opens one long-lived bidi stream
// (Session). This keeps the Windows box behind NAT/firewall with no inbound port.
// Auth: Bearer token in gRPC metadata key "authorization" ("Bearer <token>"),
// verified the same way as the Showcase link. Token comes from keymaster, not code.
package shectory.quik.v1;

option go_package = "shectory/quik/v1;quikv1";

// ---- Session: single bidi stream, agent -> STL = AgentMessage, STL -> agent = OrchestratorMessage.
service QuikAgentLink {
  rpc Session(stream AgentMessage) returns (stream OrchestratorMessage);
}

// ===================== Agent -> STL =====================
message AgentMessage {
  // monotonically increasing per session; STL echoes it back in Ack.
  uint64 seq = 1;
  oneof payload {
    Register register = 2;          // first frame after dial
    Heartbeat heartbeat = 3;        // liveness + link metrics
    SecuritiesSnapshot securities = 4;  // FORTS reference data (full or delta)
    MarketDataTick tick = 5;        // last / quote / open interest
    OrderBook order_book = 6;       // стакан, top-N levels
    ParamsSnapshot params = 7;      // price step / step cost -> commission
    Diagnostics diagnostics = 8;    // channel health snapshot
    Alert alert = 9;                // out-of-band event (also fanned to TG)
    RawTable raw_table = 10;        // any QUIK DDE sheet, verbatim (generic passthrough)
    OrderUpdate order_update = 11;   // Phase 2: order lifecycle (place/cancel/fill)
    TransReply trans_reply = 12;     // Phase 2: QUIK transaction reply (code + text)
    ExecutionUpdate execution_update = 13; // Phase 2 (1b): maker-working progress
    LimitsState limits_state = 14;   // agent's CURRENTLY EFFECTIVE hard limits (echo)
  }
}

// Generic passthrough of ANY QUIK DDE sheet the user exports (e.g. deals, or any
// custom table). Columns are the QUIK column headers; rows are stringified cells
// in column order. This is additive to the typed views (Securities/Tick/OrderBook/
// Params) — every merged sheet, including the typed ones, is also sent raw so STL
// can show any table the user wants without an allowlist.
message TableRow {
  repeated string cells = 1;
}

message RawTable {
  string name = 1;                  // QUIK "Лист" name (the sheet/item), e.g. "deals"
  repeated string columns = 2;      // header row
  repeated TableRow rows = 3;
  int64 received_at_unix_ms = 4;
}

message Register {
  string agent_version = 1;
  string host_name = 2;
  string quik_data_root = 3;
  int32 timezone_offset_min = 4;
  uint32 build_rev = 5;            // for self-update comparison
}

message Heartbeat {
  int64 sent_at_unix_ms = 1;
  bool dde_alive = 2;
  bool quik_alive = 3;
  int64 last_tick_age_ms = 4;     // staleness of freshest DDE tick
}

// ----- read-only market data -----
message Security {
  string code = 1;                // e.g. RIU6
  string name = 2;
  string class_code = 3;          // FORTS class
  double price_step = 4;          // "Шаг цены"
  double step_cost = 5;           // "Ст. шага цены"
  int64 received_at_unix_ms = 6;
}

message SecuritiesSnapshot {
  repeated Security items = 1;
  bool is_full = 2;               // true = full replace, false = delta
}

message MarketDataTick {
  string code = 1;
  double last = 2;
  double bid = 3;
  double ask = 4;
  int64 open_interest = 5;
  int64 exchange_ts_unix_ms = 6;  // from QUIK if available
  int64 received_at_unix_ms = 7;  // when agent read it from DDE
}

message OrderBookLevel {
  double price = 1;
  int64 quantity = 2;
}

message OrderBook {
  string code = 1;
  repeated OrderBookLevel bids = 2;  // sorted best-first
  repeated OrderBookLevel asks = 3;  // sorted best-first
  int64 received_at_unix_ms = 4;
}

message ParamRow {
  string code = 1;
  double price_step = 2;
  double step_cost = 3;
  double coef = 4;                // step_cost / price_step
}

message ParamsSnapshot {
  repeated ParamRow rows = 1;
  int64 received_at_unix_ms = 2;
}

// ----- health / alerting -----
enum ChannelState {
  CHANNEL_STATE_UNSPECIFIED = 0;
  CHANNEL_STATE_UP = 1;
  CHANNEL_STATE_DEGRADED = 2;
  CHANNEL_STATE_DOWN = 3;
}

message Diagnostics {
  ChannelState dde = 1;
  ChannelState quik = 2;
  ChannelState link = 3;
  int64 last_tick_age_ms = 4;
  uint32 reconnects_since_start = 5;
  int64 uptime_sec = 6;
}

enum AlertSeverity {
  ALERT_SEVERITY_UNSPECIFIED = 0;
  ALERT_SEVERITY_INFO = 1;
  ALERT_SEVERITY_WARN = 2;
  ALERT_SEVERITY_CRITICAL = 3;     // CRITICAL is the one that also gets SMS-dubbed (Phase 2 wires the gateway)
}

message Alert {
  AlertSeverity severity = 1;
  string code = 2;                // machine code, e.g. DDE_DOWN, QUIK_DOWN, LINK_DOWN
  string message = 3;             // human text for Telegram
  int64 raised_at_unix_ms = 4;
}

// ===================== STL -> agent =====================
message OrchestratorMessage {
  oneof payload {
    Ack ack = 1;                  // echoes a received AgentMessage.seq
    Command command = 2;
    PlaceOrder place_order = 3;     // Phase 2 1a: place ONE limit order
    CancelOrder cancel_order = 4;   // Phase 2 1a: cancel by client/order id
    KillSwitch kill_switch = 5;     // Phase 2: cancel all + block new
    StartExecution start_execution = 6; // Phase 2 1b: start maker-working an order
    StopExecution stop_execution = 7;   // Phase 2 1b: stop a working execution
    ReplaceOrder replace_order = 8;     // native atomic move (QUIK MOVE_ORDERS)
    SetLimits set_limits = 9;           // push the hard limits + whitelist (STL = source of truth)
  }
}

message Ack {
  uint64 ack_seq = 1;
}

// Phase 1 commands are read-only control only. No order placement here.
enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_SUBSCRIBE = 1;     // start streaming a code's ticks/order book
  COMMAND_TYPE_UNSUBSCRIBE = 2;
  COMMAND_TYPE_REQUEST_DIAGNOSTICS = 3;
  COMMAND_TYPE_REQUEST_SECURITIES = 4;
  COMMAND_TYPE_SELF_UPDATE = 5;   // orchestrator-triggered update check
  COMMAND_TYPE_RESTART = 6;       // graceful agent restart
}

message Command {
  string id = 1;
  CommandType type = 2;
  // free-form args, e.g. {"code":"RIU6","depth":"10"}
  map<string, string> args = 3;
}

// ===================== Limits sync (STL is the source of truth) =====================
// STL pushes its hard limits + whitelist to the agent so the two never diverge
// silently (a STL whitelist that the agent lacked caused orders to be rejected
// "instrument not whitelisted" BEFORE QUIK). Sent on connect (after Register) and
// whenever STL's config changes. The agent ADOPTS the whitelist and treats the
// numeric caps as a CEILING it may only tighten (it never loosens its own config
// beyond these). The MASTER FLAG (trading_enabled) is deliberately NOT pushed: it
// stays DUAL — both STL's flag and the agent's own local config must be true — so the
// agent keeps an independent kill. An empty whitelist is IGNORED (fail-safe: a bad
// push can never silently disable every instrument).
message SetLimits {
  repeated string instrument_whitelist = 1; // effective whitelist (replace; empty = ignore)
  int64 max_contracts_per_order = 2;
  int64 max_working_contracts = 3;
  double price_collar_frac = 4;
  int32 daily_order_cap = 5;
}

// Agent -> STL echo of the limits the agent is CURRENTLY enforcing (after applying
// any SetLimits). Lets STL/UI confirm a push took effect and surface a divergence
// (e.g. a whitelist mismatch) instead of discovering it only on a rejected order.
message LimitsState {
  bool trading_enabled = 1;                 // the agent's LOCAL master flag (its own config)
  repeated string instrument_whitelist = 2;
  int64 max_contracts_per_order = 3;
  int64 max_working_contracts = 4;
  double price_collar_frac = 5;
  int32 daily_order_cap = 6;
  int64 last_push_unix_ms = 7;              // when the agent last applied a SetLimits (0 = never)
}

// ===================== Phase 2: orders & execution =====================
// All order flow is HUMAN-INITIATED (STL UI + confirm). The agent enforces hard
// limits (max qty, price collar, whitelist, daily cap) as a second line on top of
// STL's. No strategy/signal generation here — only placement and maker-working of a
// human-decided order. Transport to QUIK is the QLua sendTransaction bridge.

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

// 1a: place ONE limit order. The agent rejects (before QUIK) if it violates limits.
message PlaceOrder {
  string client_id = 1;   // STL-generated id to correlate updates
  string code = 2;        // instrument (must be whitelisted)
  Side side = 3;
  double price = 4;       // limit price
  int64 quantity = 5;     // contracts
  double collar = 6;      // max adverse deviation from price (fraction, e.g. 0.002)
}

message CancelOrder {
  string client_id = 1;
  string order_id = 2;    // QUIK order id (or empty to use client_id mapping)
}

// Native atomic move: change a resting order's price (and optionally qty) in ONE QUIK
// MOVE_ORDERS transaction. NOT an internal cancel+place. The agent emits OrderUpdate for
// the moved order (its order_id may change per the broker). new_quantity 0 = keep.
message ReplaceOrder {
  string client_id = 1;
  string order_id = 2;
  double new_price = 3;
  int64 new_quantity = 4; // 0 = keep current quantity
}

message KillSwitch {
  string reason = 1;      // cancel ALL working orders + block new until cleared
}

// 1b: maker-working — passively fill target_quantity near the touch without crossing
// the spread, re-quoting on touch moves, stopping at worst_price (collar). Runs in
// the agent (sub-second, local order book). allow_cross enables a taker fallback
// (default false = pure maker).
message StartExecution {
  string client_id = 1;
  string code = 2;
  Side side = 3;
  int64 target_quantity = 4;
  double worst_price = 5;   // hard collar bound; never quote/fill beyond this
  bool allow_cross = 6;     // taker fallback; default false
}

message StopExecution {
  string client_id = 1;
}

enum OrderState {
  ORDER_STATE_UNSPECIFIED = 0;
  ORDER_STATE_PENDING = 1;    // sent to QUIK, awaiting reply
  ORDER_STATE_ACTIVE = 2;     // resting in the book
  ORDER_STATE_PARTIAL = 3;    // partially filled
  ORDER_STATE_FILLED = 4;
  ORDER_STATE_CANCELLED = 5;
  ORDER_STATE_REJECTED = 6;
}

message OrderUpdate {
  string client_id = 1;
  string order_id = 2;
  string code = 3;
  Side side = 4;
  OrderState state = 5;
  double price = 6;
  int64 quantity = 7;
  int64 filled = 8;
  string text = 9;          // exchange/QUIK text on reject/cancel
  int64 ts_unix_ms = 10;
}

message TransReply {
  string client_id = 1;
  int64 trans_id = 2;
  int32 result_code = 3;    // QUIK OnTransReply result code
  string text = 4;
  int64 ts_unix_ms = 5;
}

message ExecutionUpdate {
  string client_id = 1;
  string code = 2;
  int64 target = 3;
  int64 filled = 4;
  double avg_price = 5;
  string state = 6;         // working | done | stopped | collar_hit | rejected
  string text = 7;
  int64 ts_unix_ms = 8;
}
